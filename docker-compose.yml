services:
  redis:
    image: redis:7-alpine
    ports:
     - "6379:6379"

  api: 
    build: ./api
    ports:
      - "8000:8000"
    environment: 
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  analyzer:
    build: ./analyzer
    environment: 
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    privileged: true 